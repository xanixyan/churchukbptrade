backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "blueprints"
    label: "Blueprints"
    folder: "content/blueprints"
    create: true
    extension: "json"
    format: "json"
    slug: "{{slug}}"
    fields:
      - { label: "ID", name: "id", widget: "string", hint: "Blueprint ID from ARC Raiders" }
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string", hint: "URL-friendly identifier (e.g., assault-rifle-mk1)" }
      - { label: "Image URL", name: "image", widget: "string", required: false, hint: "Direct URL to blueprint image" }
      - { label: "Owned", name: "owned", widget: "boolean", default: false, hint: "Check if you own this blueprint" }
      - { label: "Notes", name: "notes", widget: "text", required: false, hint: "Optional notes about pricing, availability, etc." }
